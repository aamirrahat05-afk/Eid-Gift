<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Greetings</title>
    <style>
        body {
            background: linear-gradient(to right, #8e44ad, #3498db);
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        h1 {
            font-size: 4em;
        }
        .gift-box {
            font-size: 3em;
            margin: 20px;
        }
        .fireworks {
            display: none;
        }
    </style>
    <script>
        function showFireworks() {
            const fireworks = document.querySelector('.fireworks');
            fireworks.style.display = 'block';
            setTimeout(() => {
                fireworks.style.display = 'none';
            }, 2000);
        }
    </script>
</head>
<body>
    <h1>Happy Eid Mubarak!</h1>
    <div class="gift-box">🎁</div>
    <p>Wishing you joy, peace, and blessings on this special day.</p>
    <button onclick="showFireworks()">Celebrate!</button>
    <div class="fireworks">🎆🎇</div>
</body>
</html>
